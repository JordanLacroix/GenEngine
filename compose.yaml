name: genengine

x-api-environment: &api-environment
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_HTTP_PORTS: 8080
  Database__AutoMigrate: "true"
  Jwt__Issuer: GenEngine.Identity
  Jwt__Audience: GenEngine.Api
  Jwt__Secret: ${GENENGINE_JWT_SECRET:-local-development-jwt-secret-change-me-2026}

services:
  authoring-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genengine_authoring
      POSTGRES_USER: authoring
      POSTGRES_PASSWORD: ${AUTHORING_DB_PASSWORD:-authoring-local-password}
    ports:
      - "5432:5432"
    volumes:
      - authoring-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authoring -d genengine_authoring"]
      interval: 3s
      timeout: 3s
      retries: 20

  play-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genengine_play
      POSTGRES_USER: play
      POSTGRES_PASSWORD: ${PLAY_DB_PASSWORD:-play-local-password}
    ports:
      - "5433:5432"
    volumes:
      - play-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U play -d genengine_play"]
      interval: 3s
      timeout: 3s
      retries: 20

  identity-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genengine_identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:-identity-local-password}
    ports:
      - "5434:5432"
    volumes:
      - identity-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d genengine_identity"]
      interval: 3s
      timeout: 3s
      retries: 20

  configuration-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genengine_configuration
      POSTGRES_USER: configuration
      POSTGRES_PASSWORD: ${CONFIGURATION_DB_PASSWORD:-configuration-local-password}
    ports:
      - "5435:5432"
    volumes:
      - configuration-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U configuration -d genengine_configuration"]
      interval: 3s
      timeout: 3s
      retries: 20

  player-experience-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genengine_player_experience
      POSTGRES_USER: player_experience
      POSTGRES_PASSWORD: ${PLAYER_EXPERIENCE_DB_PASSWORD:-player-experience-local-password}
    ports:
      - "5436:5432"
    volumes:
      - player-experience-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U player_experience -d genengine_player_experience"]
      interval: 3s
      timeout: 3s
      retries: 20

  organization-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genengine_organization
      POSTGRES_USER: organization
      POSTGRES_PASSWORD: ${ORGANIZATION_DB_PASSWORD:-organization-local-password}
    ports:
      - "5437:5432"
    volumes:
      - organization-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organization -d genengine_organization"]
      interval: 3s
      timeout: 3s
      retries: 20

  authoring:
    build:
      context: .
      dockerfile: src/Services/Authoring/GenEngine.Authoring.Api/Dockerfile
    environment:
      <<: *api-environment
      ConnectionStrings__Authoring: Host=authoring-db;Database=genengine_authoring;Username=authoring;Password=${AUTHORING_DB_PASSWORD:-authoring-local-password}
      InternalApi__Key: ${GENENGINE_INTERNAL_KEY:-local-internal-key-change-me}
      Configuration__BaseUrl: http://configuration:8080
      AzureFoundry__Endpoint: ${AZURE_FOUNDRY_ENDPOINT:-}
      AzureFoundry__Deployment: ${AZURE_FOUNDRY_DEPLOYMENT:-}
      # Target of the `env:GENENGINE_AI_AZURE_FOUNDRY_KEY` secret reference held in the
      # configuration document. Empty locally: the provider is then seen as not configured
      # and the offline provider takes over.
      GENENGINE_AI_AZURE_FOUNDRY_KEY: ${GENENGINE_AI_AZURE_FOUNDRY_KEY:-}
    ports:
      - "5201:8080"
    depends_on:
      authoring-db:
        condition: service_healthy
      configuration:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  play:
    build:
      context: .
      dockerfile: src/Services/Play/GenEngine.Play.Api/Dockerfile
    environment:
      <<: *api-environment
      ConnectionStrings__Play: Host=play-db;Database=genengine_play;Username=play;Password=${PLAY_DB_PASSWORD:-play-local-password}
      Services__Authoring: http://authoring:8080
      Services__Organization: http://organization:8080
      Services__Configuration: http://configuration:8080
      Services__PlayerExperience: http://player-experience:8080
      InternalApi__Key: ${GENENGINE_INTERNAL_KEY:-local-internal-key-change-me}
    ports:
      - "5202:8080"
    depends_on:
      play-db:
        condition: service_healthy
      authoring:
        condition: service_healthy
      organization:
        condition: service_healthy
      configuration:
        condition: service_healthy
      player-experience:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  identity:
    build:
      context: .
      dockerfile: src/Services/Identity/GenEngine.Identity.Api/Dockerfile
    environment:
      <<: *api-environment
      ConnectionStrings__Identity: Host=identity-db;Database=genengine_identity;Username=identity;Password=${IDENTITY_DB_PASSWORD:-identity-local-password}
      Authentication__Mode: ${AUTHENTICATION_MODE:-Cumulative}
      Authentication__Entra__TenantId: ${ENTRA_TENANT_ID:-}
      Authentication__Entra__ClientId: ${ENTRA_CLIENT_ID:-}
      Bootstrap__Key: ${GENENGINE_BOOTSTRAP_KEY:-}
    ports:
      - "5203:8080"
    depends_on:
      identity-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  configuration:
    build:
      context: .
      dockerfile: src/Services/Configuration/GenEngine.Configuration.Api/Dockerfile
    environment:
      <<: *api-environment
      ConnectionStrings__Configuration: Host=configuration-db;Database=genengine_configuration;Username=configuration;Password=${CONFIGURATION_DB_PASSWORD:-configuration-local-password}
    ports:
      - "5204:8080"
    depends_on:
      configuration-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  player-experience:
    build:
      context: .
      dockerfile: src/Services/PlayerExperience/GenEngine.PlayerExperience.Api/Dockerfile
    environment:
      <<: *api-environment
      ConnectionStrings__PlayerExperience: Host=player-experience-db;Database=genengine_player_experience;Username=player_experience;Password=${PLAYER_EXPERIENCE_DB_PASSWORD:-player-experience-local-password}
      Configuration__BaseUrl: http://configuration:8080
      Services__Authoring: http://authoring:8080
      InternalApi__Key: ${GENENGINE_INTERNAL_KEY:-local-internal-key-change-me}
      GENENGINE_AI_AZURE_FOUNDRY_KEY: ${GENENGINE_AI_AZURE_FOUNDRY_KEY:-}
    ports:
      - "5205:8080"
    depends_on:
      player-experience-db:
        condition: service_healthy
      configuration:
        condition: service_healthy
      # Contextual help reads author help from published versions. Authoring being
      # down only degrades help to its offline rules, never blocks the service.
      authoring:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  organization:
    build:
      context: .
      dockerfile: src/Services/Organization/GenEngine.Organization.Api/Dockerfile
    environment:
      <<: *api-environment
      ConnectionStrings__Organization: Host=organization-db;Database=genengine_organization;Username=organization;Password=${ORGANIZATION_DB_PASSWORD:-organization-local-password}
      InternalApi__Key: ${GENENGINE_INTERNAL_KEY:-local-internal-key-change-me}
    ports:
      - "5206:8080"
    depends_on:
      organization-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Client Web. Le navigateur ne parle qu'à ce service : la résolution des URLs
  # de moteur est faite côté Node, donc les noms de services Compose suffisent.
  web:
    # Profil dédié: le contexte de build est le dépôt voisin GenEngine.Web, que
    # l'intégration continue de ce dépôt ne récupère pas. Sans profil, `docker
    # compose build` y échoue immédiatement. Démarrage explicite:
    #   docker compose --profile web up -d
    profiles: ["web"]
    build:
      context: ../GenEngine.Web
      dockerfile: Dockerfile
    environment:
      GENENGINE_AUTHORING_URL: http://authoring:8080
      GENENGINE_PLAY_URL: http://play:8080
      GENENGINE_IDENTITY_URL: http://identity:8080
      GENENGINE_CONFIGURATION_URL: http://configuration:8080
      GENENGINE_PLAYER_EXPERIENCE_URL: http://player-experience:8080
      GENENGINE_ORGANIZATION_URL: http://organization:8080
      # L'image est bâtie en NODE_ENV=production, où la surcharge de session est
      # désactivée par défaut. On la rouvre explicitement pour la pile locale,
      # sinon l'écran /parametres serait en lecture seule sur une démonstration.
      GENENGINE_ALLOW_ENDPOINT_OVERRIDE: "true"
      GENENGINE_ENDPOINT_ALLOWED_HOSTS: localhost,127.0.0.1,::1,host.docker.internal,authoring,play,identity,configuration,player-experience,organization
    ports:
      - "3000:3000"
    depends_on:
      authoring:
        condition: service_healthy
      configuration:
        condition: service_healthy
      identity:
        condition: service_healthy
      play:
        condition: service_healthy
      player-experience:
        condition: service_healthy
      organization:
        condition: service_healthy

volumes:
  authoring-data:
  play-data:
  identity-data:
  configuration-data:
  player-experience-data:
  organization-data:
