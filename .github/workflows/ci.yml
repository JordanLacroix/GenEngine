name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # Required for tokenless Codecov authentication through OIDC.

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore GenEngine.sln --locked-mode

      - name: Build
        run: dotnet build GenEngine.sln --no-restore -warnaserror

      - name: Test with coverage
        run: >-
          dotnet test GenEngine.sln
          --no-build
          --logger "trx"
          --collect "XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('TestResults/**/coverage.cobertura.xml') != '' }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          use_oidc: true
          files: TestResults/**/coverage.cobertura.xml
          # Coverage must not hide a valid build while the repository is being onboarded on Codecov.
          fail_ci_if_error: false
          disable_telem: true
