version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    labels: ["dependencies", "area: infrastructure"]
    commit-message:
      prefix: "build(deps)"
    groups:
      microsoft-dotnet:
        patterns: ["Microsoft.*"]
      test-tooling:
        patterns: ["coverlet.*", "Microsoft.NET.Test.Sdk", "xunit*"]
  - package-ecosystem: docker
    directories:
      - "/src/Services/Authoring/GenEngine.Authoring.Api"
      - "/src/Services/Identity/GenEngine.Identity.Api"
      - "/src/Services/Play/GenEngine.Play.Api"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    labels: ["dependencies", "area: infrastructure"]
    commit-message:
      prefix: "build(deps)"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    labels: ["dependencies", "area: infrastructure"]
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
